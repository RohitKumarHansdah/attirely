{% extends 'store/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm mt-5">
            <h3 class="text-center mb-4">Welcome Back</h3>
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-dark btn-lg w-100 mt-3">Login</button>
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-dark fw-bold">Join Now</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
